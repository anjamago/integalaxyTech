apiVersion: apps/v1
kind: Deployment
metadata:
  name: intergalaxy-tech-api
  labels:
    app: intergalaxy-tech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: intergalaxy-tech
  template:
    metadata:
      labels:
        app: intergalaxy-tech
    spec:
      containers:
      - name: api
        image: intergalaxytech/api:latest
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: intergalaxy-tech-service
spec:
  type: LoadBalancer
  selector:
    app: intergalaxy-tech
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
