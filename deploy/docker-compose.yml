services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING:-Data Source=/app/data/intergalaxy.db}
      - RickAndMortyApi__BaseUrl=${RICK_MORTY_API_URL:-https://rickandmortyapi.com/api/character}
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/data

volumes:
  sqlite_data:
